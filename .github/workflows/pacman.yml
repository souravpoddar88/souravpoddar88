name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Create dist folder
        run: mkdir -p dist

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: souravpoddar88
          outputs: |
            dist/github-contribution-grid-pacman.svg:flavor=pacman
            dist/github-contribution-grid-pacman-dark.svg:flavor=pacman&color_snake=#FFD700&color_dots=#161b22,#0d4429,#006d32,#26a641,#39d353

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          force_orphan: true
