name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Pacman SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: souravpoddar88
          outputs: |
            dist/github-contribution-grid-pacman.svg:flavor=pacman

      - name: Check dist contents
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== Dist files ==="
          ls -la dist/ 2>/dev/null || echo "NO DIST FOLDER"
          echo "=== Find SVGs ==="
          find . -name "*.svg" 2>/dev/null

      - name: Push to output branch
        if: success()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: false
