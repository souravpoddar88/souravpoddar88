name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Create dist folder
        run: mkdir -p dist

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: souravpoddar88
          outputs: |
            dist/github-contribution-grid-pacman.svg:flavor=pacman
            dist/github-contribution-grid-pacman-dark.svg:flavor=pacman&color_snake=#FFD700&color_dots=#161b22,#0d4429,#006d32,#26a641,#39d353

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
